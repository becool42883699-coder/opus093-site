# mainへのプッシュで静的ビルドを gh-pages ブランチへ公開する
# (gh-pagesブランチ方式: GITHUB_TOKENの標準権限で動作し、Pagesも自動有効化される)
# 公開URL: https://becool42883699-coder.github.io/opus093-site/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_OUTPUT: export
          NEXT_PUBLIC_BASE_PATH: /opus093-site
      - run: node scripts/postprocess-pages.mjs
        env:
          NEXT_PUBLIC_BASE_PATH: /opus093-site
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
